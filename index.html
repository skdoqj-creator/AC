};

let curTab = '삼국';
let curEraIdx = 0;
let selectedId = null;

function fmtY(y){return y<0?`BC${Math.abs(y)}`:`${y}`;}
function pct(y,s,e){return Math.max(0,Math.min(100,(y-s)/(e-s)*100));}

function buildTabs(){
  const el=document.getElementById('tab-row');
  el.innerHTML='';
  TABS.forEach(t=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(t.id===curTab?' active':'');
    b.textContent=t.label;
    b.onclick=()=>{curTab=t.id;curEraIdx=0;selectedId=null;render();};
    el.appendChild(b);
  });
}

function buildEras(){
  const el=document.getElementById('era-row');
  el.innerHTML='';
  const eras=ERAS[curTab];
  eras.forEach((era,i)=>{
    const b=document.createElement('button');
    b.className='era-btn'+(i===curEraIdx?' active':'');
    b.textContent=era.label;
    b.onclick=()=>{curEraIdx=i;selectedId=null;render();};
    el.appendChild(b);
  });
}

function buildLegend(){
  const el=document.getElementById('legend');
  el.innerHTML='';
  const rows=DATA[curTab].rows;
  rows.forEach(k=>{
    const kd=KD[k];
    const d=document.createElement('div');
    d.className='ld';
    d.innerHTML=`<div class="ld-sq" style="background:${kd.color}"></div><span>${k}</span>`;
    el.appendChild(d);
  });
  Object.entries(EV_TYPES).forEach(([,et])=>{
    const d=document.createElement('div');
    d.className='ld';
    d.innerHTML=`<div class="ld-ci" style="background:${et.color};border:1.5px solid ${et.border}"></div><span>${et.label}</span>`;
    el.appendChild(d);
  });
}

function buildTimeline(){
  const area=document.getElementById('tl-area');
  area.innerHTML='';
  const era=ERAS[curTab][curEraIdx];
  const {s:S,e:E}=era;
  const {kings,events,rows}=DATA[curTab];

  const axis=document.createElement('div');
  axis.className='axis-row';
  const klbl=document.createElement('div');
  klbl.style.cssText='width:52px;flex-shrink:0;';
  const atrack=document.createElement('div');
  atrack.className='axis-track';
  for(let i=0;i<=6;i++){
    const yr=Math.round(S+(E-S)*i/6);
    const tk=document.createElement('span');
    tk.className='axis-tick';
    tk.style.left=`${i/6*100}%`;
    tk.textContent=fmtY(yr);
    atrack.appendChild(tk);
  }
  axis.appendChild(klbl);axis.appendChild(atrack);
  area.appendChild(axis);

  const evLbl=document.createElement('div');
  evLbl.className='tl-sec-label';
  evLbl.textContent='국가 간 주요 사건';
  area.appendChild(evLbl);

  const evRow=document.createElement('div');
  evRow.className='ev-track-row';
  const ePlaceholder=document.createElement('div');
  ePlaceholder.style.cssText='width:52px;flex-shrink:0;';
  const eTrack=document.createElement('div');
  eTrack.className='ev-track';

  const visEvs=events.filter(ev=>ev.year>=S&&ev.year<=E);
  visEvs.forEach(ev=>{
    const lp=pct(ev.year,S,E);
    const et=EV_TYPES[ev.type];
    const stem=document.createElement('div');
    stem.className='ev-stem';
    stem.style.cssText=`left:${lp}%;background:${et.color}44;`;
    eTrack.appendChild(stem);
    const lbl=document.createElement('div');
    lbl.className='ev-yr-label';
    lbl.style.cssText=`left:${lp}%;color:${et.color};`;
    lbl.textContent=fmtY(ev.year);
    eTrack.appendChild(lbl);
    const dot=document.createElement('div');
    dot.className='ev-dot'+(selectedId===ev.id?' selected':'');
    dot.style.cssText=`left:${lp}%;background:${et.color};border-color:${et.border};`;
    dot.title=ev.title;
    dot.onclick=()=>{selectEvent(ev);};
    eTrack.appendChild(dot);
  });

  evRow.appendChild(ePlaceholder);evRow.appendChild(eTrack);
  area.appendChild(evRow);

  const sep=document.createElement('div');
  sep.className='sep-line';
  area.appendChild(sep);

  const kLbl=document.createElement('div');
  kLbl.className='tl-sec-label';
  kLbl.textContent='왕 재위 기간';
  area.appendChild(kLbl);

  rows.forEach(kname=>{
    const row=document.createElement('div');
    row.className='tl-row';
    const lbl=document.createElement('div');
    lbl.className='tl-klabel';
    lbl.textContent=kname;
    const track=document.createElement('div');
    track.className='tl-track';

    kings.filter(k=>k.k===kname).forEach(king=>{
      if(king.e<S||king.s>E)return;
      const ls=Math.max(king.s,S),le=Math.min(king.e,E);
      const left=pct(ls,S,E),width=pct(le,S,E)-left;
      if(width<0.1)return;
      const kd=KD[kname];
      const block=document.createElement('div');
      const sid=`king-${kname}-${king.name}`;
      block.className='king-block'+(selectedId===sid?' selected':'');
      if(selectedId===sid) block.style.outlineColor=kd.color;
      block.style.cssText+=`left:${left}%;width:${width}%;background:${isDark?kd.color+'30':kd.light};border-color:${kd.color}55;`;
      const inner=document.createElement('div');
      inner.className='kb-in';
      const nm=document.createElement('div');
      nm.className='kb-nm';
      nm.style.color=isDark?kd.light:kd.dark;
      nm.textContent=king.name;
      inner.appendChild(nm);
      if(width>3.5){
        const yr=document.createElement('div');
        yr.className='kb-yr';
        yr.style.color=isDark?kd.light:kd.dark;
        yr.textContent=`${fmtY(king.s)}~${fmtY(king.e)}`;
        inner.appendChild(yr);
      }
      block.appendChild(inner);
      block.onclick=()=>selectKing(king,kname,sid);
      track.appendChild(block);
    });

    row.appendChild(lbl);row.appendChild(track);
    area.appendChild(row);
  });
}

function buildEventCards(){
  const sec=document.getElementById('ev-section');
  sec.innerHTML='';
  const era=ERAS[curTab][curEraIdx];
  const {events}=DATA[curTab];
  const visEvs=events.filter(ev=>ev.year>=era.s&&ev.year<=era.e).sort((a,b)=>a.year-b.year);
  if(!visEvs.length)return;

  const lbl=document.createElement('div');
  lbl.className='ev-section-lbl';
  lbl.textContent='국가 간 주요 사건';
  sec.appendChild(lbl);

  const grid=document.createElement('div');
  grid.className='ev-cards-grid';

  visEvs.forEach(ev=>{
    const et=EV_TYPES[ev.type];
    const card=document.createElement('div');
    card.className='ev-card'+(selectedId===ev.id?' selected':'');
    card.id='evc-'+ev.id;
    if(selectedId===ev.id) card.style.outlineColor=et.color;
    const top=document.createElement('div');
    top.className='ev-card-top';
    const dot=document.createElement('div');dot.className='ev-card-dot';dot.style.background=et.color;
    const yr=document.createElement('span');yr.className='ev-card-yr';yr.textContent=fmtY(ev.year);
    const tp=document.createElement('span');tp.className='ev-card-type';
    tp.style.cssText=`background:${isDark?et.dbg:et.bg};color:${isDark?et.dtx:et.border};`;
    tp.textContent=et.label;
    top.appendChild(dot);top.appendChild(yr);top.appendChild(tp);
    const title=document.createElement('div');title.className='ev-card-title';title.textContent=ev.title;
    const desc=document.createElement('div');desc.className='ev-card-desc';desc.textContent=ev.desc;
    const parties=document.createElement('div');parties.className='ev-card-parties';
    ev.parties.forEach(p=>{
      const kd=KD[p];if(!kd)return;
      const pill=document.createElement('span');pill.className='ev-p-pill';
      pill.style.cssText=`background:${isDark?kd.color+'33':kd.light};color:${isDark?kd.light:kd.dark};`;
      pill.textContent=p;parties.appendChild(pill);
    });
    card.appendChild(top);card.appendChild(title);card.appendChild(desc);card.appendChild(parties);
    card.onclick=()=>selectEvent(ev);
    grid.appendChild(card);
  });
  sec.appendChild(grid);
}

function selectKing(king,kname,sid){
  selectedId=sid;
  const kd=KD[kname];
  const pillStyle=`background:${isDark?kd.color+'33':kd.light};color:${isDark?kd.light:kd.dark};`;
  document.getElementById('dp-title').textContent=king.name;
  document.getElementById('dp-sub').textContent=`${kname} · ${fmtY(king.s)} ~ ${fmtY(king.e)}`;

  const contemps=DATA[curTab].kings.filter(k=>k.k!==kname&&k.s<king.e&&k.e>king.s)
    .reduce((acc,k)=>{if(!acc.find(x=>x.k===k.k))acc.push(k);return acc;},[]);

  document.getElementById('dp-body').innerHTML=`
    <div class="king-name-badge">
      <span class="k-pill" style="${pillStyle}">${kname}</span>
      <span class="king-period">${fmtY(king.s)} ~ ${fmtY(king.e)}</span>
    </div>
    <ul class="ach-list">${king.ach.map(a=>`<li>${a}</li>`).join('')}</ul>
    ${contemps.length?`<div class="contemp-row"><div class="contemp-label">동시대 왕</div><div class="contemp-pills">${contemps.slice(0,5).map(c=>{const cc=KD[c.k];return`<span class="ct-pill" style="background:${isDark?cc.color+'33':cc.light};color:${isDark?cc.light:cc.dark};">${c.k}·${c.name}</span>`;}).join('')}</div></div>`:''}
  `;
  rebuildSelected();
}

function selectEvent(ev){
  selectedId=ev.id;
  const et=EV_TYPES[ev.type];
  const relKings=DATA[curTab].kings.filter(k=>ev.parties.includes(k.k)&&k.s<=ev.year&&k.e>=ev.year);
  document.getElementById('dp-title').textContent=ev.title;
  document.getElementById('dp-sub').textContent=`${fmtY(ev.year)} · ${et.label}`;
  document.getElementById('dp-body').innerHTML=`
    <span class="ev-detail-type" style="background:${isDark?et.dbg:et.bg};color:${isDark?et.dtx:et.border};">${et.label}</span>
    <div class="ev-detail-desc">${ev.desc}</div>
    ${relKings.length?`<div class="contemp-row"><div class="contemp-label">당시 재위 왕</div><div class="ev-detail-parties">${relKings.map(k=>{const kd=KD[k.k];return`<span class="ct-pill" style="background:${isDark?kd.color+'33':kd.light};color:${isDark?kd.light:kd.dark};">${k.k}·${k.name}</span>`;}).join('')}</div></div>`:''}
  `;
  rebuildSelected();
  const card=document.getElementById('evc-'+ev.id);
  if(card)card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function rebuildSelected(){
  buildTimeline();
  buildEventCards();
}

function render(){
  buildTabs();
  buildEras();
  buildLegend();
  buildTimeline();
  buildEventCards();
  document.getElementById('dp-title').textContent='상세 정보';
  document.getElementById('dp-sub').textContent='왕 또는 사건을 클릭하세요';
  document.getElementById('dp-body').innerHTML='<div class="detail-placeholder">왕 블록이나<br>사건 카드를<br>클릭하면<br>업적이 표시됩니다</div>';
}

render();
</script>
